<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --border: #2a2a3a;
            --accent: #00ff88;
            --accent2: #7c3aed;
            --text: #e8e8f0;
            --muted: #5a5a7a;
            --error: #ff4466;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            z-index: 0;
        }

        .glow2 {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text);
        }

        .brand-name span {
            color: var(--accent);
        }

        .brand-sub {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 3px;
            margin-top: 6px;
            text-transform: uppercase;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .tabs {
            display: flex;
            background: var(--bg);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            color: var(--muted);
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .tab.active {
            background: var(--accent);
            color: #000;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
        }

        input::placeholder { color: var(--muted); }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            margin-top: 8px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,255,136,0.25);
        }

        .btn:active { transform: translateY(0); }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            display: none;
        }

        .msg.error {
            background: rgba(255,68,102,0.1);
            border: 1px solid rgba(255,68,102,0.3);
            color: var(--error);
            display: block;
        }

        .msg.success {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: var(--accent);
            display: block;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <div class="glow2"></div>

    <div class="container">
        <div class="brand">
            <div class="brand-name">Dev<span>Track</span></div>
            <div class="brand-sub">consistency over intensity</div>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('signup')">Sign Up</div>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@dev.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" />
                </div>
                <button class="btn" onclick="handleLogin()">Login →</button>
                <div class="msg" id="loginMsg"></div>
            </div>

            <!-- SIGNUP FORM -->
            <div id="signupForm" class="hidden">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="signupName" placeholder="Shivam" />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="you@dev.com" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" />
                </div>
                <button class="btn" onclick="handleSignup()">Create Account →</button>
                <div class="msg" id="signupMsg"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
            });
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg ${type}`;
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) return showMsg('loginMsg', 'Fill all fields', 'error');

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) return showMsg('loginMsg', data.message, 'error');

                localStorage.setItem('token', data.token);
                localStorage.setItem('name', data.name);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showMsg('loginMsg', 'Server error. Is backend running?', 'error');
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) return showMsg('signupMsg', 'Fill all fields', 'error');

            try {
                const res = await fetch(`${API}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (!res.ok) return showMsg('signupMsg', data.message, 'error');

                showMsg('signupMsg', 'Account created! Logging you in...', 'success');
                setTimeout(() => switchTab('login'), 1500);
            } catch (err) {
                showMsg('signupMsg', 'Server error. Is backend running?', 'error');
            }
        }

        // redirect if already logged in
        if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
