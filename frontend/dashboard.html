<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #16161f;
            --border: #2a2a3a;
            --accent: #00ff88;
            --accent2: #7c3aed;
            --text: #e8e8f0;
            --muted: #5a5a7a;
            --error: #ff4466;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .nav-brand {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .nav-brand span { color: var(--accent); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-user {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .nav-user span { color: var(--accent); }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 14px;
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .btn-logout:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* MAIN LAYOUT */
        .main {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .stat-card:hover::after { transform: scaleX(1); }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .stat-sub {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 6px;
        }

        /* POST BOX */
        .post-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .post-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }

        .post-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .post-label span { color: var(--accent); }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.88rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            min-height: 90px;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.06);
        }

        textarea::placeholder { color: var(--muted); }

        .post-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .btn-post {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-family: 'Syne', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-post:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,255,136,0.25);
        }

        .btn-post:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .post-msg {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            margin-top: 10px;
            display: none;
        }

        .post-msg.success { color: var(--accent); display: block; }
        .post-msg.error { color: var(--error); display: block; }

        /* FEED */
        .feed-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeUp 0.5s 0.2s ease both;
        }

        .feed-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .feed-count {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .feed-nav {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .feed-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 14px;
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-size: 0.68rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .feed-btn.active, .feed-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* UPDATE CARDS */
        .updates-list { display: flex; flex-direction: column; gap: 12px; }

        .update-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeUp 0.4s ease both;
        }

        .update-card:hover {
            border-color: rgba(0,255,136,0.2);
            transform: translateX(4px);
        }

        .update-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--accent2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .update-meta { flex: 1; }

        .update-name {
            font-size: 0.88rem;
            font-weight: 600;
        }

        .update-time {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .update-content {
            font-family: 'Space Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.7;
            color: #c8c8e0;
            padding-left: 42px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <div class="nav-brand">Dev<span>Track</span></div>
        <div class="nav-right">
            <div class="nav-user">logged in as <span id="navName">...</span></div>
            <button class="btn-logout" onclick="logout()">logout</button>
        </div>
    </nav>

    <div class="main">
        <!-- STATS -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">🔥 Current Streak</div>
                <div class="stat-value" id="statStreak">—</div>
                <div class="stat-sub">days in a row</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📦 Total Updates</div>
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-sub">posts submitted</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📅 Last Active</div>
                <div class="stat-value" id="statLast" style="font-size:1.1rem; padding-top:6px;">—</div>
                <div class="stat-sub">most recent post</div>
            </div>
        </div>

        <!-- POST BOX -->
        <div class="post-box">
            <div class="post-label">// <span>what did you work on today?</span></div>
            <textarea id="updateContent" placeholder="Learned JWT auth in Express. Built middleware to protect routes. Fixed a mongoose populate bug..."></textarea>
            <div class="post-footer">
                <button class="btn-post" onclick="postUpdate()">Post Update →</button>
            </div>
            <div class="post-msg" id="postMsg"></div>
        </div>

        <!-- FEED -->
        <div class="feed-header">
            <div class="feed-title">Team Feed</div>
            <div class="feed-count" id="feedCount">0 updates</div>
            <div class="feed-nav">
                <button class="feed-btn active" id="btnAll" onclick="switchFeed('all')">All</button>
                <button class="feed-btn" id="btnMine" onclick="switchFeed('mine')">Mine</button>
            </div>
        </div>

        <div class="updates-list" id="updatesList">
            <div class="loading">loading feed...</div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';
        let currentFeed = 'all';
        let myUserId = null;

        // auth check
        const token = localStorage.getItem('token');
        const name = localStorage.getItem('name');
        if (!token) window.location.href = 'login.html';

        document.getElementById('navName').textContent = name || 'dev';

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr);
            const mins = Math.floor(diff / 60000);
            const hrs = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            if (hrs < 24) return `${hrs}h ago`;
            return `${days}d ago`;
        }

        function getInitials(name) {
            return name ? name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2) : '??';
        }

        function getColor(name) {
            const colors = ['#7c3aed','#db2777','#0891b2','#059669','#d97706','#dc2626'];
            let hash = 0;
            for (let c of (name || '')) hash += c.charCodeAt(0);
            return colors[hash % colors.length];
        }

        async function loadStats() {
            if (!myUserId) return;
            try {
                const res = await fetch(`${API}/stats/${myUserId}`);
                const data = await res.json();
                document.getElementById('statStreak').textContent = data.streak ?? 0;
                document.getElementById('statTotal').textContent = data.totalUpdates ?? 0;
                document.getElementById('statLast').textContent = data.lastActive ?? 'never';
            } catch (e) {
                console.error('Stats error', e);
            }
        }

        async function loadFeed() {
            const list = document.getElementById('updatesList');
            list.innerHTML = '<div class="loading">loading...</div>';
            try {
                let url = currentFeed === 'all' ? `${API}/feed` : `${API}/user/${myUserId}`;
                const res = await fetch(url);
                const updates = await res.json();

                // grab userId from first own update if not set
                if (!myUserId && currentFeed === 'all') {
                    const mine = updates.find(u => u.userId?.name === name);
                    if (mine) myUserId = mine.userId._id;
                }

                document.getElementById('feedCount').textContent = `${updates.length} updates`;

                if (updates.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>No updates yet.<br>Be the first to post something!</p>
                        </div>`;
                    return;
                }

                list.innerHTML = updates.map((u, i) => {
                    const uname = u.userId?.name || 'Unknown';
                    const color = getColor(uname);
                    return `
                        <div class="update-card" style="animation-delay: ${i * 0.05}s">
                            <div class="update-top">
                                <div class="avatar" style="background:${color}">${getInitials(uname)}</div>
                                <div class="update-meta">
                                    <div class="update-name">${uname}</div>
                                    <div class="update-time">${timeAgo(u.createdAt)}</div>
                                </div>
                            </div>
                            <div class="update-content">${u.content}</div>
                        </div>`;
                }).join('');
            } catch (e) {
                list.innerHTML = '<div class="loading">failed to load. is backend running?</div>';
            }
        }

        async function getUserId() {
            // decode token to get id
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                myUserId = payload.id;
            } catch(e) {}
        }

        async function postUpdate() {
            const content = document.getElementById('updateContent').value.trim();
            const btn = document.querySelector('.btn-post');
            const msg = document.getElementById('postMsg');

            if (!content) {
                msg.textContent = 'Write something first!';
                msg.className = 'post-msg error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Posting...';

            try {
                const res = await fetch(`${API}/update`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ content })
                });
                const data = await res.json();

                if (!res.ok) {
                    msg.textContent = data.message;
                    msg.className = 'post-msg error';
                } else {
                    msg.textContent = '✓ Posted successfully!';
                    msg.className = 'post-msg success';
                    document.getElementById('updateContent').value = '';
                    loadFeed();
                    loadStats();
                    setTimeout(() => { msg.className = 'post-msg'; }, 3000);
                }
            } catch (e) {
                msg.textContent = 'Server error. Is backend running?';
                msg.className = 'post-msg error';
            }

            btn.disabled = false;
            btn.textContent = 'Post Update →';
        }

        function switchFeed(type) {
            currentFeed = type;
            document.getElementById('btnAll').classList.toggle('active', type === 'all');
            document.getElementById('btnMine').classList.toggle('active', type === 'mine');
            loadFeed();
        }

        // init
        getUserId().then(() => {
            loadFeed();
            loadStats();
        });
    </script>
</body>
</html>
