<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevTrack</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 40px auto; padding: 20px; background: #f4f4f4; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0056b3; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .msg { padding: 8px; border-radius: 5px; margin-top: 8px; font-size: 13px; }
        .error { background: #ffe0e0; color: red; }
        .success { background: #e0ffe0; color: green; }
        .card { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .card p { margin: 5px 0; font-size: 14px; }
        .card small { color: gray; font-size: 12px; }
        h2 { color: #333; }
        h3 { color: #555; margin-top: 0; }
        .hidden { display: none; }
        .tab { display: inline-block; padding: 8px 20px; cursor: pointer; background: #ddd; border-radius: 5px; margin-right: 5px; }
        .tab.active { background: #007bff; color: white; }
        .stat { display: inline-block; background: #007bff; color: white; padding: 10px 20px; border-radius: 8px; margin-right: 10px; text-align: center; }
        .stat h1 { margin: 0; font-size: 2rem; }
        .stat small { font-size: 12px; }
        #logoutBtn { background: red; float: right; }
    </style>
</head>
<body>

<!-- ==================== AUTH SECTION ==================== -->
<div id="authSection">
    <h2>DevTrack 🚀</h2>

    <!-- tabs -->
    <div style="margin-bottom: 15px;">
        <span class="tab active" onclick="switchTab('login')">Login</span>
        <span class="tab" onclick="switchTab('signup')">Signup</span>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" class="box">
        <h3>Login</h3>
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button onclick="login()">Login</button>
        <div id="loginMsg" class="msg hidden"></div>
    </div>

    <!-- SIGNUP -->
    <div id="signupBox" class="box hidden">
        <h3>Signup</h3>
        <input type="text" id="signupName" placeholder="Name" />
        <input type="email" id="signupEmail" placeholder="Email" />
        <input type="password" id="signupPassword" placeholder="Password" />
        <button onclick="signup()">Create Account</button>
        <div id="signupMsg" class="msg hidden"></div>
    </div>
</div>

<!-- ==================== DASHBOARD SECTION ==================== -->
<div id="dashSection" class="hidden">

    <h2>DevTrack 🚀 <button id="logoutBtn" onclick="logout()">Logout</button></h2>
    <p>Welcome, <strong id="userName"></strong></p>

    <!-- STATS -->
    <div class="box">
        <h3>Your Stats</h3>
        <div id="statsBox">Loading...</div>
    </div>

    <!-- POST UPDATE -->
    <div class="box">
        <h3>Post Today's Update</h3>
        <textarea id="updateContent" rows="3" placeholder="What did you work on today?"></textarea>
        <button onclick="postUpdate()">Submit Update</button>
        <div id="updateMsg" class="msg hidden"></div>
    </div>

    <!-- FEED -->
    <div class="box">
        <h3>
            Team Feed
            <span class="tab active" style="float:right; font-size:13px;" onclick="switchFeed('all')" id="btnAll">All</span>
            <span class="tab" style="float:right; font-size:13px; margin-right:5px;" onclick="switchFeed('mine')" id="btnMine">Mine</span>
        </h3>
        <div id="feedBox">Loading...</div>
    </div>

</div>

<script>
    const API = 'http://localhost:8000'
    let currentFeed = 'all'

    // ─── check if already logged in ───
    if (localStorage.getItem('token')) {
        showDashboard()
    }

    // ─── TAB SWITCH ───
    function switchTab(tab) {
        // toggle active class on tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))

        if (tab === 'login') {
            document.getElementById('loginBox').classList.remove('hidden')
            document.getElementById('signupBox').classList.add('hidden')
            document.querySelectorAll('.tab')[0].classList.add('active')
        } else {
            document.getElementById('loginBox').classList.add('hidden')
            document.getElementById('signupBox').classList.remove('hidden')
            document.querySelectorAll('.tab')[1].classList.add('active')
        }
    }

    // ─── SHOW MSG ───
    function showMsg(id, text, type) {
        const el = document.getElementById(id)
        el.textContent = text
        el.className = `msg ${type}`
    }

    // ─── SIGNUP ───
    async function signup() {
        const name = document.getElementById('signupName').value
        const email = document.getElementById('signupEmail').value
        const password = document.getElementById('signupPassword').value

        if (!name || !email || !password) {
            return showMsg('signupMsg', 'Please fill all fields', 'error')
        }

        const res = await fetch(`${API}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        })
        const data = await res.json()

        if (!res.ok) return showMsg('signupMsg', data.message, 'error')

        showMsg('signupMsg', 'Account created! Please login.', 'success')
        setTimeout(() => switchTab('login'), 1500)
    }

    // ─── LOGIN ───
    async function login() {
        const email = document.getElementById('loginEmail').value
        const password = document.getElementById('loginPassword').value

        if (!email || !password) {
            return showMsg('loginMsg', 'Please fill all fields', 'error')
        }

        const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })
        const data = await res.json()

        if (!res.ok) return showMsg('loginMsg', data.message, 'error')

        // save token and name in browser
        localStorage.setItem('token', data.token)
        localStorage.setItem('name', data.name)

        showDashboard()
    }

    // ─── LOGOUT ───
    function logout() {
        localStorage.clear()
        document.getElementById('authSection').classList.remove('hidden')
        document.getElementById('dashSection').classList.add('hidden')
    }

    // ─── SHOW DASHBOARD ───
    function showDashboard() {
        document.getElementById('authSection').classList.add('hidden')
        document.getElementById('dashSection').classList.remove('hidden')
        document.getElementById('userName').textContent = localStorage.getItem('name')
        loadFeed()
        loadStats()
    }

    // ─── GET USER ID FROM TOKEN ───
    function getUserId() {
        const token = localStorage.getItem('token')
        // JWT has 3 parts separated by dot
        // middle part is payload — contains our userId
        const payload = JSON.parse(atob(token.split('.')[1]))
        return payload.id
    }

    // ─── LOAD STATS ───
    async function loadStats() {
        const userId = getUserId()
        const res = await fetch(`${API}/stats/${userId}`)
        const data = await res.json()

        document.getElementById('statsBox').innerHTML = `
            <div class="stat">
                <h1>${data.streak}</h1>
                <small>🔥 Streak (days)</small>
            </div>
            <div class="stat">
                <h1>${data.totalUpdates}</h1>
                <small>📦 Total Updates</small>
            </div>
            <div class="stat">
                <h1 style="font-size:1rem; padding-top:8px;">${data.lastActive || 'N/A'}</h1>
                <small>📅 Last Active</small>
            </div>
        `
    }

    // ─── POST UPDATE ───
    async function postUpdate() {
        const content = document.getElementById('updateContent').value
        const token = localStorage.getItem('token')

        if (!content) return showMsg('updateMsg', 'Write something first!', 'error')

        const res = await fetch(`${API}/update`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`   // send token here
            },
            body: JSON.stringify({ content })
        })
        const data = await res.json()

        if (!res.ok) return showMsg('updateMsg', data.message, 'error')

        showMsg('updateMsg', 'Posted successfully!', 'success')
        document.getElementById('updateContent').value = ''
        loadFeed()
        loadStats()
    }

    // ─── LOAD FEED ───
    async function loadFeed() {
        const userId = getUserId()
        let url = currentFeed === 'all' ? `${API}/feed` : `${API}/user/${userId}`

        const res = await fetch(url)
        const updates = await res.json()

        if (updates.length === 0) {
            document.getElementById('feedBox').innerHTML = '<p>No updates yet. Post something!</p>'
            return
        }

        // loop through updates array and build HTML
        let html = ''
        for (let i = 0; i < updates.length; i++) {
            const u = updates[i]
            const name = u.userId?.name || 'Unknown'
            const date = new Date(u.createdAt).toLocaleString()
            html += `
                <div class="card">
                    <p><strong>${name}</strong></p>
                    <p>${u.content}</p>
                    <small>${date}</small>
                </div>
            `
        }
        document.getElementById('feedBox').innerHTML = html
    }

    // ─── SWITCH FEED ───
    function switchFeed(type) {
        currentFeed = type
        document.getElementById('btnAll').classList.toggle('active', type === 'all')
        document.getElementById('btnMine').classList.toggle('active', type === 'mine')
        loadFeed()
    }
</script>

</body>
</html>
